[theme]
name = "catppuccin"

[theme.light]
fg_primary = "#4c4f69"
fg_muted = "#6c6f85"
fg_accent = "#1e66f5"
bg_primary = "#eff1f5"
bg_muted = "#ccd0da"
bg_neutral_muted = "#ccd0da66"
bg_attention_muted = "#df8e1d26"
bg_secondary = "#e6e9ef"
border_primary = "#9ca0b0"
border_muted = "#bcc0cc"
fg_sheen = "#4c4f69"
bg_sheen = "#eff1f5"
border_sheen = "transparent"
alert_note = "#1e66f5"
alert_tip = "#40a02b"
alert_important = "#8839ef"
