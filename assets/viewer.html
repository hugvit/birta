<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{FILENAME}} — sheen</title>
  <style>{{GITHUB_CSS}}</style>
  <style>{{THEME_OVERRIDES}}</style>
  <style>{{PAGE_CSS}}</style>
  <style>{{SYNTAX_CSS}}</style>
  <style>{{ALERTS_CSS}}</style>
  {{CUSTOM_CSS}}
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css" crossorigin="anonymous">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-left">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
        <path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25Zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5Zm6.75.062V4.25c0 .138.112.25.25.25h2.688l-.011-.013-2.914-2.914-.013-.011Z"/>
      </svg>
      <span class="filename" id="filename">{{FILENAME}}</span>
    </div>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
      <span id="theme-icon">☀️</span>
    </button>
  </header>

  <main class="container">
    <article class="markdown-body" id="content">{{CONTENT}}</article>
  </main>

  <div class="status" id="status"></div>

  <script>
    // Theme handling
    (function() {
      var html = document.documentElement;
      var mdBody = document.getElementById('content');
      var btn = document.getElementById('theme-toggle');
      var icon = document.getElementById('theme-icon');
      var stored = localStorage.getItem('sheen-theme');

      function applyTheme(theme) {
        if (theme === 'dark' || theme === 'light') {
          html.setAttribute('data-theme', theme);
          mdBody.setAttribute('data-theme', theme);
        } else {
          html.removeAttribute('data-theme');
          mdBody.removeAttribute('data-theme');
        }
        icon.textContent = getEffectiveTheme() === 'dark' ? '☀️' : '🌙';
      }

      function getEffectiveTheme() {
        var explicit = html.getAttribute('data-theme');
        if (explicit) return explicit;
        return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      }

      applyTheme(stored);

      btn.addEventListener('click', function() {
        var next = getEffectiveTheme() === 'dark' ? 'light' : 'dark';
        localStorage.setItem('sheen-theme', next);
        applyTheme(next);
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
        if (!localStorage.getItem('sheen-theme')) applyTheme(null);
      });
    })();

    // Math rendering via KaTeX
    // comrak emits: <span data-math-style="...">, <code data-math-style="...">,
    // and <pre data-math-style="display"><code>...</code></pre>
    function renderMath() {
      if (typeof katex === 'undefined') return;
      document.querySelectorAll('[data-math-style]').forEach(function(el) {
        if (el.hasAttribute('data-math-rendered')) return;
        var displayMode = el.getAttribute('data-math-style') === 'display';
        var tex = el.textContent;
        try {
          katex.render(tex, el, { displayMode: displayMode, throwOnError: false });
          el.setAttribute('data-math-rendered', '');
        } catch (e) { /* leave raw text on error */ }
      });
    }

    // Mermaid diagram rendering
    // comrak (via AST transform) emits <pre class="mermaid">...</pre>
    var mermaidReady = false;
    function initMermaid() {
      if (typeof mermaid === 'undefined') return;
      if (mermaidReady) return;
      var theme = (document.documentElement.getAttribute('data-theme') === 'dark' ||
        (!document.documentElement.getAttribute('data-theme') &&
         window.matchMedia('(prefers-color-scheme: dark)').matches)) ? 'dark' : 'default';
      mermaid.initialize({ startOnLoad: false, theme: theme });
      mermaidReady = true;
    }

    function renderMermaid() {
      if (typeof mermaid === 'undefined') return;
      initMermaid();
      // mermaid.run() renders all <pre class="mermaid"> elements
      mermaid.run({ querySelector: 'pre.mermaid' });
    }

    // Render math and diagrams on initial load (scripts are defer)
    function renderAll() { renderMath(); renderMermaid(); }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', renderAll);
    } else {
      setTimeout(renderAll, 0);
    }

    // Scroll synchronization
    // Finds the nearest element at or before the given source line and scrolls to it.
    // comrak's sourcepos format: "start_line:start_col-end_line:end_col"
    function scrollToLine(targetLine) {
      var els = content.querySelectorAll('[data-sourcepos]');
      if (!els.length) return;

      // Binary search for the last element with start_line <= targetLine
      var best = null;
      var lo = 0, hi = els.length - 1;
      while (lo <= hi) {
        var mid = (lo + hi) >> 1;
        var line = parseInt(els[mid].getAttribute('data-sourcepos'), 10);
        if (line <= targetLine) {
          best = els[mid];
          lo = mid + 1;
        } else {
          hi = mid - 1;
        }
      }

      if (best) {
        best.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // Checkbox write-back
    // Enable task list checkboxes and send toggle messages via WebSocket
    function enableCheckboxes() {
      content.querySelectorAll('input[type="checkbox"][disabled]').forEach(function(cb) {
        cb.disabled = false;
        cb.addEventListener('change', function(e) {
          var li = e.target.closest('li[data-sourcepos]');
          if (!li || !currentWs || currentWs.readyState !== WebSocket.OPEN) return;
          var line = parseInt(li.getAttribute('data-sourcepos'), 10);
          currentWs.send(JSON.stringify({
            type: 'checkbox', line: line, checked: e.target.checked
          }));
        });
      });
    }

    // WebSocket live reload
    var currentWs = null;
    (function() {
      var content = document.getElementById('content');
      var status = document.getElementById('status');
      var reconnectDelay = 1000;
      var maxDelay = 10000;

      function showStatus(msg) {
        status.textContent = msg;
        status.classList.add('visible');
      }

      function hideStatus() {
        status.classList.remove('visible');
      }

      function connect() {
        var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        var ws = new WebSocket(proto + '//' + location.host + '/ws');
        currentWs = ws;

        ws.onopen = function() {
          reconnectDelay = 1000;
          hideStatus();
        };

        ws.onmessage = function(event) {
          var data = event.data;
          if (data.charAt(0) === '{') {
            var msg = JSON.parse(data);
            if (msg.type === 'scroll') scrollToLine(msg.line);
            return;
          }
          content.innerHTML = data;
          renderMath();
          renderMermaid();
          enableCheckboxes();
        };

        ws.onclose = function() {
          currentWs = null;
          showStatus('Disconnected — reconnecting…');
          setTimeout(function() {
            reconnectDelay = Math.min(reconnectDelay * 2, maxDelay);
            connect();
          }, reconnectDelay);
        };
      }

      connect();
    })();

    // Enable checkboxes on initial page load
    enableCheckboxes();
  </script>
</body>
</html>
